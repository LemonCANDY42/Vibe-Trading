name: moirix_event_impact_desk
title: "Moirix Event Impact Desk"
description: "PIT evidence query -> event-impact graph -> bull/bear theses -> backtest feature candidates -> authority-boundary review."

agents:
  - id: evidence_librarian
    role: PIT Evidence Librarian
    system_prompt: |
      You are responsible for querying Moirix for point-in-time source evidence.

      Task:
      - Check Moirix adapter status.
      - Query PIT evidence for {target} in {market} as of {as_of}, looking back {lookback_days} days.
      - Preserve Moirix status exactly: ok, blocked, or unavailable.
      - If Moirix is blocked or unavailable, list blockers and clearly label any fallback web research as ad-hoc rather than PIT source-lake evidence.

      Do not fabricate missing news coverage. Do not call broker or order tools.
    tools: [read_file, write_file, load_skill, moirix_status, moirix_query_news, web_search, read_url]
    skills: [moirix-event-graph, event-driven, web-reader]
    max_iterations: 24
    timeout_seconds: 900
    max_retries: 1

  - id: event_graph_analyst
    role: Event Graph Analyst
    system_prompt: |
      You turn Moirix evidence into a candidate event-impact graph for {target}.

      {upstream_context}

      Task:
      - Build the Moirix event graph from available Moirix evidence.
      - Rank impact paths by direction, confidence, and affected instruments.
      - Preserve Moirix coverage and authority fields.
      - Treat all graph output as candidate hypothesis evidence only.

      If no PIT evidence exists, do not invent a graph. Report the blocked state.
    tools: [read_file, write_file, load_skill, moirix_build_event_graph]
    skills: [moirix-event-graph]
    max_iterations: 24
    timeout_seconds: 900
    max_retries: 1

  - id: bull_bear_debate
    role: Bull Bear Debate
    system_prompt: |
      You convert the event-impact graph for {target} into balanced research theses.

      {upstream_context}

      Task:
      - Write the strongest bull thesis and strongest bear thesis.
      - Separate evidence, inference, and unsupported gaps.
      - Identify which graph paths matter most for {target} and related assets.
      - Avoid trading instructions and avoid real-account advice.
    tools: [read_file, write_file, load_skill]
    skills: [moirix-event-graph, risk-analysis]
    max_iterations: 20
    timeout_seconds: 900
    max_retries: 1

  - id: strategy_translator
    role: Strategy Translator
    system_prompt: |
      You translate Moirix event graph findings into possible Vibe backtest inputs.

      {upstream_context}

      Task:
      - Propose event CSV rows or factor candidates that could be tested later.
      - Use knowable dates from Moirix visible/as-of fields when available.
      - Mark every candidate as research-only and unvalidated.
      - Do not run or propose live trades.
    tools: [read_file, write_file, load_skill]
    skills: [moirix-event-graph, event-driven, strategy-generate]
    max_iterations: 20
    timeout_seconds: 900
    max_retries: 1

  - id: risk_reviewer
    role: Coverage And Authority Reviewer
    system_prompt: |
      You review the Moirix/Vibe event-impact run for coverage gaps, future-leakage risk, and authority boundaries.

      {upstream_context}

      Task:
      - Check whether Moirix status was ok, blocked, or unavailable.
      - Verify whether source-lake coverage was actually proven for {target}, {market}, and {as_of}.
      - Identify future-leakage risks, missing visible_at fields, source gaps, and unsupported claims.
      - Confirm no broker, order, custody, or live-trading path was introduced.
      - Produce a concise final review with blocking and non-blocking findings.
    tools: [read_file, write_file, load_skill, moirix_status]
    skills: [moirix-event-graph, risk-analysis]
    max_iterations: 20
    timeout_seconds: 900
    max_retries: 1

tasks:
  - id: task-evidence
    agent_id: evidence_librarian
    prompt_template: "Query Moirix PIT evidence for {target} in {market} as of {as_of} with a {lookback_days}-day lookback. Preserve ok/blocked/unavailable status and artifact paths."
    depends_on: []

  - id: task-graph
    agent_id: event_graph_analyst
    prompt_template: "Build and summarize the Moirix candidate event-impact graph for {target} as of {as_of}. Preserve source coverage and authority fields."
    depends_on: [task-evidence]
    input_from:
      evidence: task-evidence

  - id: task-debate
    agent_id: bull_bear_debate
    prompt_template: "Debate bull and bear implications for {target} using only the Moirix graph/evidence and clearly marked inferences."
    depends_on: [task-graph]
    input_from:
      graph: task-graph
      evidence: task-evidence

  - id: task-strategy-translation
    agent_id: strategy_translator
    prompt_template: "Translate Moirix findings for {target} into research-only event CSV or factor candidates for later backtesting."
    depends_on: [task-graph]
    input_from:
      graph: task-graph
      evidence: task-evidence

  - id: task-risk-review
    agent_id: risk_reviewer
    prompt_template: "Review the Moirix event-impact run for {target} in {market} as of {as_of}: coverage gaps, future-leakage risks, and authority boundaries."
    depends_on: [task-debate, task-strategy-translation]
    input_from:
      evidence: task-evidence
      graph: task-graph
      debate: task-debate
      strategy_candidates: task-strategy-translation

variables:
  - name: target
    description: "Target symbol or instrument, e.g. NVDA"
    required: true
  - name: market
    description: "Market label, e.g. US, HK, A-share"
    required: true
  - name: as_of
    description: "Point-in-time cutoff date/time, e.g. 2025-05-01"
    required: true
  - name: lookback_days
    description: "Lookback window in calendar days, e.g. 30"
    required: true
